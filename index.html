<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amaral & Puga — Processos v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

/* LOGIN */
#login{position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px 48px;width:360px;text-align:center}
.login-logo{font-size:28px;font-weight:700;margin-bottom:4px;color:#58a6ff}
.login-sub{color:#8b949e;font-size:13px;margin-bottom:28px}
.login-box input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#e6edf3;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#58a6ff}
.login-box button{width:100%;background:#238636;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;padding:11px;cursor:pointer;margin-top:4px}
.login-box button:hover{background:#2ea043}
#lerr{color:#f85149;font-size:13px;margin-top:8px;display:none}
#lload{color:#8b949e;font-size:13px;margin-top:8px;display:none}

/* APP */
#app{display:none;flex-direction:column;height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-logo{font-size:17px;font-weight:700;color:#58a6ff}
.topbar-user{color:#8b949e;font-size:13px;margin-left:auto}
.topbar button{background:transparent;border:1px solid #30363d;border-radius:6px;color:#cdd9e5;font-size:12px;padding:5px 10px;cursor:pointer}
.topbar button:hover{background:#21262d}
.searchbar{padding:10px 20px;background:#0d1117;border-bottom:1px solid #21262d;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.sinp{background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:13px;padding:7px 12px;width:260px;outline:none}
.sinp:focus{border-color:#58a6ff}
.fb{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:12px;padding:5px 10px;cursor:pointer}
.fb.on{background:#1f3a5f;color:#58a6ff;border-color:#58a6ff}
.fb.gold{color:#d29922}
.fb.gold.on{background:#3d2f00;border-color:#d29922;color:#d29922}
#btn-novo{background:#238636;border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;margin-left:auto}
#btn-novo:hover{background:#2ea043}

/* BOARD */
#board{display:flex;gap:14px;padding:16px 20px;overflow-x:auto;flex:1;align-items:flex-start}
.col{background:#161b22;border:1px solid #30363d;border-radius:12px;width:300px;min-width:300px;display:flex;flex-direction:column;max-height:calc(100vh - 120px)}
.col-header{padding:12px 14px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-title{font-size:13px;font-weight:600;flex:1}
.col-count{background:#21262d;border-radius:10px;font-size:11px;color:#8b949e;padding:1px 7px}
.col-add{padding:8px 14px;border-top:1px solid #21262d;flex-shrink:0}
.col-add button{background:transparent;border:1px dashed #30363d;border-radius:6px;color:#8b949e;font-size:12px;padding:5px 10px;cursor:pointer;width:100%}
.col-add button:hover{background:#21262d;color:#cdd9e5}
.cards{flex:1;overflow-y:auto;padding:8px}
.cards::-webkit-scrollbar{width:4px}
.cards::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}

/* CARDS */
.kcard{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.kcard:hover{border-color:#58a6ff}
.kcard.dragging{opacity:.4}
.kcard.drag-over{border-top:2px solid #58a6ff}
.kcard-top{display:flex;align-items:flex-start;gap:6px}
.kcard-nome{font-size:13px;font-weight:600;flex:1;line-height:1.3}
.kcard-star{font-size:16px;cursor:pointer;flex-shrink:0;opacity:.6}
.kcard-star:hover,.kcard-star.on{opacity:1}
.kcard-tese{font-size:11px;color:#8b949e;margin-top:4px;line-height:1.3}
.kcard-num{font-size:10px;color:#58a6ff;margin-top:4px}
.kcard-footer{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.kcard-cnt{font-size:10px;color:#8b949e}
.badge-prazo{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:auto}
.badge-ok{background:#1a3a1a;color:#3fb950}
.badge-warn{background:#3d2f00;color:#d29922}
.badge-late{background:#3d0a0a;color:#f85149}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#modal-bg.show{display:flex}
#modal{background:#161b22;border:1px solid #30363d;border-radius:14px;width:580px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column}
.modal-head{padding:16px 20px;border-bottom:1px solid #21262d;display:flex;align-items:flex-start;gap:10px}
.modal-head-info{flex:1}
#m-nome{font-size:16px;font-weight:700}
#m-tese{font-size:12px;color:#8b949e;margin-top:2px}
#m-num{font-size:11px;color:#58a6ff;margin-top:2px}
#m-star{font-size:22px;cursor:pointer;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.modal-section{margin-bottom:16px}
.modal-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.modal-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.modal-row label{font-size:12px;color:#8b949e;width:90px;flex-shrink:0}
.modal-row input,.modal-row select{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:13px;padding:6px 10px;outline:none}
.modal-row input:focus,.modal-row select:focus{border-color:#58a6ff}
select option{background:#161b22}
.modal-foot{padding:12px 20px;border-top:1px solid #21262d;display:flex;gap:8px;align-items:center;flex-shrink:0}
.modal-foot input[type=text]{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:13px;padding:7px 10px;outline:none}
.modal-foot input:focus{border-color:#58a6ff}
.modal-foot select{background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;padding:7px 8px;outline:none}
.btn-save{background:#238636;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:600;padding:7px 16px;cursor:pointer}
.btn-save:hover{background:#2ea043}
.btn-edit{background:#1f3a5f;border:none;border-radius:6px;color:#58a6ff;font-size:12px;padding:6px 12px;cursor:pointer}
.btn-edit:hover{background:#1c4373}
.btn-del{background:#3d0a0a;border:none;border-radius:6px;color:#f85149;font-size:12px;padding:6px 12px;cursor:pointer;margin-left:auto}
.btn-del:hover{background:#5c1515}
.btn-close{background:transparent;border:none;color:#8b949e;font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.btn-close:hover{color:#e6edf3}

/* EDIT SECTION */
#edit-section{display:none;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;margin-bottom:12px}
#edit-section .modal-row input,#edit-section .modal-row select{background:#161b22}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:6px}
.tl-item{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px 10px;font-size:12px;line-height:1.5;display:flex;align-items:flex-start;gap:8px}
.tl-item-text{flex:1;white-space:pre-wrap;word-break:break-word}
.tl-date{color:#58a6ff;font-weight:600;font-size:11px;flex-shrink:0}
.tl-actions{display:flex;gap:4px;flex-shrink:0}
.tl-btn{background:transparent;border:none;color:#8b949e;font-size:11px;cursor:pointer;padding:2px 4px}
.tl-btn:hover{color:#e6edf3}
.tl-edit-box{display:none;margin-top:6px}
.tl-edit-box textarea{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;padding:6px;outline:none;resize:vertical;min-height:50px}
.tl-edit-btns{display:flex;gap:6px;margin-top:4px}
.tl-edit-btns button{background:#21262d;border:1px solid #30363d;border-radius:5px;color:#cdd9e5;font-size:11px;padding:4px 10px;cursor:pointer}
.no-hist{color:#8b949e;font-size:12px;padding:8px 0;text-align:center}

/* NOVO PROCESSO */
#np-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#np-bg.show{display:flex}
#np-box{background:#161b22;border:1px solid #30363d;border-radius:14px;width:480px;max-width:95vw;padding:24px}
#np-box h3{font-size:15px;font-weight:700;margin-bottom:16px;color:#58a6ff}
.np-row{margin-bottom:10px;position:relative}
.np-row label{font-size:12px;color:#8b949e;display:block;margin-bottom:4px}
.np-row input,.np-row select,.np-row textarea{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:13px;padding:7px 10px;outline:none}
.np-row input:focus,.np-row select:focus,.np-row textarea:focus{border-color:#58a6ff}
.np-row textarea{resize:vertical;min-height:60px}
.np-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.autocomplete-list{position:absolute;z-index:300;background:#161b22;border:1px solid #30363d;border-radius:6px;top:100%;left:0;right:0;max-height:180px;overflow-y:auto;display:none}
.autocomplete-list div{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #21262d}
.autocomplete-list div:hover{background:#21262d}
.autocomplete-list div span{color:#8b949e;font-size:11px;margin-left:8px}

/* CONFIRM */
#confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center}
#confirm-bg.show{display:flex}
#confirm-box{background:#161b22;border:1px solid #f85149;border-radius:12px;padding:24px;width:340px;text-align:center}
#confirm-box p{margin-bottom:16px;font-size:14px}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-btns button{border-radius:6px;font-size:13px;font-weight:600;padding:8px 20px;cursor:pointer;border:none}
#btn-confirm-del{background:#f85149;color:#fff}
#btn-confirm-del:hover{background:#da3633}
#btn-confirm-cancel{background:#21262d;color:#cdd9e5}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#21262d;color:#e6edf3;border-radius:8px;padding:10px 20px;font-size:13px;display:none;z-index:9999;border:1px solid #30363d}

/* LOADING */
#board-loading{text-align:center;padding:40px;color:#8b949e;font-size:14px;display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">⚖️ Amaral & Puga</div>
    <div class="login-sub">Controle de Processos Tributários</div>
    <input type="text" id="usr" placeholder="Usuário" autocomplete="username" onkeydown="if(event.key==='Enter')entrar()">
    <input type="password" id="pwd" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
    <button onclick="entrar()">Entrar</button>
    <div id="lerr">Usuário ou senha incorretos</div>
    <div id="lload">⏳ Carregando processos...</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">⚖️ Amaral & Puga</span>
    <span id="sub" style="font-size:12px;color:#8b949e"></span>
    <span class="topbar-user">👤 <span id="unm"></span></span>
    <button onclick="sair()">Sair</button>
  </div>
  <div class="searchbar">
    <input class="sinp" id="bsc" oninput="renderBoard()" placeholder="🔍  Buscar empresa ou tese...">
    <div class="fbtns" id="fbtns"></div>
    <button id="btn-novo" onclick="abrirNP(null)">+ Novo Processo</button>
  </div>
  <div id="board-loading">⏳ Carregando processos do banco...</div>
  <div id="board"></div>
</div>

<!-- MODAL DETALHE -->
<div id="modal-bg" onclick="if(event.target===this)fecharModal()">
  <div id="modal">
    <div class="modal-head">
      <div class="modal-head-info">
        <div id="m-nome"></div>
        <div id="m-tese"></div>
        <div id="m-num"></div>
      </div>
      <span id="m-star" onclick="togStarModal()">☆</span>
      <button class="btn-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Editar dados -->
      <button class="btn-edit" id="btn-toggle-edit" onclick="toggleEditDados()" style="margin-bottom:12px">✏️ Editar dados</button>
      <div id="edit-section">
        <div class="modal-row"><label>Razão Social</label><input id="ed-nome" type="text"></div>
        <div class="modal-row"><label>CNPJ</label><input id="ed-cnpj" type="text"></div>
        <div class="modal-row"><label>Nº Processo</label><input id="ed-num" type="text"></div>
        <div class="modal-row"><label>Tese</label><input id="ed-tese" type="text"></div>
        <div class="modal-row"><label>Honorários</label><input id="ed-honor" type="text"></div>
        <div class="modal-row"><label>Prazo</label><input id="ed-prazo" type="date"></div>
        <div class="modal-row"><label>Status</label>
          <select id="ed-status">
            <option>Não Iniciado</option><option>Em Negociação</option>
            <option>Ação a Protocolar</option><option>Pendência PH</option>
            <option>Pendência Cliente</option><option>Pendência Documentação</option>
            <option>Finalizado</option>
          </select>
        </div>
        <div style="text-align:right;margin-top:8px">
          <button class="btn-save" onclick="salvarDadosModal()">💾 Salvar alterações</button>
        </div>
      </div>
      <!-- Histórico -->
      <div class="modal-section">
        <div class="modal-label">📋 Histórico de movimentações (<span id="m-cnt">0</span>)</div>
        <div id="m-timeline" class="timeline"></div>
      </div>
    </div>
    <div class="modal-foot">
      <select id="es_m"></select>
      <input type="text" id="eo_m" placeholder="Descreva a movimentação..." onkeydown="if(event.key==='Enter'&&event.ctrlKey)salvarModal()">
      <button class="btn-save" onclick="salvarModal()">Salvar</button>
      <button class="btn-del" onclick="pedirRemocao(MI)">🗑</button>
    </div>
  </div>
</div>

<!-- NOVO PROCESSO -->
<div id="np-bg" onclick="if(event.target===this)fecharNP()">
  <div id="np-box">
    <h3>➕ Novo Processo</h3>
    <div class="np-row" id="np-nome-wrap">
      <label>Razão Social *</label>
      <input id="np-nome" type="text" placeholder="Digite o nome da empresa..." oninput="filtrarClientes(this.value)" autocomplete="off">
      <div class="autocomplete-list" id="ac-list"></div>
    </div>
    <div class="np-row"><label>CNPJ</label><input id="np-cnpj" type="text" placeholder="00.000.000/0000-00"></div>
    <div class="np-row"><label>Tese *</label><input id="np-tese" type="text" placeholder="Ex: Exclusão ICMS PIS/COFINS"></div>
    <div class="np-row"><label>Nº Processo</label><input id="np-num" type="text"></div>
    <div class="np-row"><label>Prazo</label><input id="np-prazo" type="date"></div>
    <div class="np-row"><label>Status</label>
      <select id="np-status">
        <option>Não Iniciado</option><option>Em Negociação</option>
        <option>Ação a Protocolar</option><option>Pendência PH</option>
        <option>Pendência Cliente</option><option>Pendência Documentação</option>
        <option>Finalizado</option>
      </select>
    </div>
    <div class="np-row"><label>Observação inicial</label><textarea id="np-obs" placeholder="Opcional..."></textarea></div>
    <div class="np-btns">
      <button class="btn-edit" onclick="fecharNP()">Cancelar</button>
      <button class="btn-save" onclick="salvarNovo()">➕ Criar processo</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div id="confirm-bg">
  <div id="confirm-box">
    <p id="confirm-msg">Excluir este processo?</p>
    <div class="confirm-btns">
      <button id="btn-confirm-cancel" onclick="fecharConfirm()">Cancelar</button>
      <button id="btn-confirm-del" onclick="confirmarRemocao()">Excluir</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// CONFIGURAÇÃO
// ============================================================
var CRUD_URL = "https://base44.app/api/apps/6a0e3ef6bb37789b7478edbb/functions/processosCRUD";
var CALENDAR_URL = "https://base44.app/api/apps/6a0e3ef6bb37789b7478edbb/functions/criarEventoCalendar";

var COLUNAS = [
  {status:"Não Iniciado",       cor:"#8b949e", label:"Não Iniciado"},
  {status:"Em Negociação",      cor:"#d29922", label:"Em Negociação"},
  {status:"Ação a Protocolar",  cor:"#388bfd", label:"Ação a Protocolar"},
  {status:"Pendência PH",       cor:"#f0b429", label:"Pendência PH ⭐"},
  {status:"Pendência Cliente",  cor:"#f85149", label:"Pendência Cliente"},
  {status:"Pendência Documentação", cor:"#db61a2", label:"Pendência Doc."},
  {status:"Finalizado",         cor:"#3fb950", label:"Finalizado"},
];

// Estado global
var D = [];       // todos os processos
var CLIENTES = []; // autocomplete
var MODO = "";    // "m" ou "p"
var SF = "";      // filtro status
var AA = false;   // apenas ativos
var FP = false;   // apenas prioridade
var MI = null;    // índice modal aberto
var REMOVE_IDX = null;
var NP_STATUS = null;
var _dragIdx = null;

// ============================================================
// TOAST
// ============================================================
function toast(msg, cor){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = cor || "#21262d";
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.style.display = "none"; }, 3000);
}

// ============================================================
// LOGIN
// ============================================================
function entrar(){
  var u = document.getElementById("usr").value.trim().toLowerCase();
  var pw = document.getElementById("pwd").value.trim();
  if(u === "matheus" && pw === "matheus2026") MODO = "m";
  else if(u === "paulo" && pw === "paulo2026") MODO = "p";
  else { document.getElementById("lerr").style.display = "block"; return; }

  document.getElementById("lerr").style.display = "none";
  document.getElementById("lload").style.display = "block";
  document.getElementById("board-loading").style.display = "block";

  // Carregar dados do banco
  fetch(CRUD_URL, { method:"GET" })
  .then(function(r){ return r.json(); })
  .then(function(resp){
    if(resp.ok && resp.data && resp.data.length > 0){
      D = resp.data;
      // Extrair clientes únicos para autocomplete
      var seen = {};
      CLIENTES = [];
      D.forEach(function(p){
        if(p.cnpj && !seen[p.cnpj]){
          seen[p.cnpj] = true;
          CLIENTES.push({cnpj:p.cnpj, razao_social:p.razao_social});
        }
      });
    }
    // Abrir app
    document.getElementById("lload").style.display = "none";
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("board-loading").style.display = "none";
    document.getElementById("unm").textContent = MODO==="m" ? "Matheus" : "Paulo H.";
    document.getElementById("sub").textContent = MODO==="m" ? "Painel Completo" : "Suas Pendências";
    setupFiltros();
    renderBoard();
  })
  .catch(function(e){
    document.getElementById("lload").style.display = "none";
    document.getElementById("lerr").textContent = "Erro ao conectar ao servidor. Tente novamente.";
    document.getElementById("lerr").style.display = "block";
    MODO = "";
  });
}

function sair(){
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("usr").value = "";
  document.getElementById("pwd").value = "";
  D = []; MODO = ""; MI = null; SF = ""; AA = false; FP = false;
}

// ============================================================
// FILTROS
// ============================================================
function setupFiltros(){
  var c = document.getElementById("fbtns");
  var h = "";
  if(MODO === "m"){
    h += "<button class='fb on' id='f-todos' onclick='setF(null)'>Todos</button>";
    h += "<button class='fb gold' id='f-prio' onclick='togFP()'>⭐ Prioridade</button>";
  }
  c.innerHTML = h;
}

function setF(status){
  SF = status || "";
  renderBoard();
}

function togFP(){
  FP = !FP;
  var btn = document.getElementById("f-prio");
  if(btn) btn.className = "fb gold" + (FP?" on":"");
  renderBoard();
}

// ============================================================
// RENDER BOARD
// ============================================================
function renderBoard(){
  var busca = (document.getElementById("bsc")||{}).value||"";
  busca = busca.toLowerCase();

  var lista = D.filter(function(p){
    if(MODO === "p" && !p.prioridade) return false;
    if(SF && p.status !== SF) return false;
    if(FP && !p.prioridade) return false;
    if(busca){
      var txt = (p.razao_social||"")+" "+(p.tese||"")+" "+(p.cnpj||"")+" "+(p.numero_processo||"");
      if(txt.toLowerCase().indexOf(busca) === -1) return false;
    }
    return true;
  });

  var cols = MODO === "p"
    ? COLUNAS.filter(function(c){ return c.status === "Pendência PH"; })
    : COLUNAS;

  var board = document.getElementById("board");
  board.innerHTML = "";

  cols.forEach(function(col){
    var items = lista.filter(function(p){ return p.status === col.status; });
    var div = document.createElement("div");
    div.className = "col";
    div.setAttribute("data-status", col.status);
    div.addEventListener("dragover", function(e){ e.preventDefault(); });
    div.addEventListener("drop", function(e){ dropOnCol(e, col.status); });

    var h = "<div class='col-header'>";
    h += "<div class='col-dot' style='background:"+col.cor+"'></div>";
    h += "<div class='col-title'>"+col.label+"</div>";
    h += "<div class='col-count'>"+items.length+"</div></div>";
    h += "<div class='cards' id='cards-"+col.status.replace(/\s/g,'_')+"'>";

    items.forEach(function(p){
      var idx = D.indexOf(p);
      h += mkCard(p, idx);
    });

    h += "</div>";
    h += "<div class='col-add'><button onclick='abrirNP(\""+esc(col.status)+"\")'>+ Adicionar</button></div>";
    div.innerHTML = h;
    board.appendChild(div);
  });

  // Bind drag events em todos os cards
  board.querySelectorAll(".kcard").forEach(function(el){
    el.addEventListener("dragstart", function(e){
      _dragIdx = parseInt(el.getAttribute("data-idx"));
      el.classList.add("dragging");
    });
    el.addEventListener("dragend", function(e){
      el.classList.remove("dragging");
      board.querySelectorAll(".kcard").forEach(function(c){ c.classList.remove("drag-over"); });
    });
    el.addEventListener("dragover", function(e){
      e.preventDefault();
      board.querySelectorAll(".kcard").forEach(function(c){ c.classList.remove("drag-over"); });
      el.classList.add("drag-over");
    });
    el.addEventListener("drop", function(e){
      e.preventDefault();
      e.stopPropagation();
      var targetIdx = parseInt(el.getAttribute("data-idx"));
      moverCard(_dragIdx, targetIdx);
    });
  });
}

function mkCard(p, idx){
  var prazo = mkPrazoBadge(p.data_prazo);
  var cnt = contMov(p);
  var h = "<div class='kcard' data-idx='"+idx+"' draggable='true' onclick='abrirModal("+idx+")'>";
  h += "<div class='kcard-top'>";
  h += "<div class='kcard-nome'>"+esc(p.razao_social||"")+"</div>";
  h += "<div class='kcard-star "+(p.prioridade?"on":"")+"' onclick='togStar("+idx+",event)'>"+(p.prioridade?"⭐":"☆")+"</div>";
  h += "</div>";
  h += "<div class='kcard-tese'>"+esc(p.tese||"")+"</div>";
  if(p.numero_processo) h += "<div class='kcard-num'>📋 "+esc(p.numero_processo)+"</div>";
  h += "<div class='kcard-footer'>";
  h += "<span class='kcard-cnt'>📝 "+cnt+"</span>";
  if(prazo) h += prazo;
  h += "</div></div>";
  return h;
}

function mkPrazoBadge(data_prazo){
  if(!data_prazo) return "";
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var partes = data_prazo.split("-");
  if(partes.length !== 3) return "";
  var prazo = new Date(parseInt(partes[0]), parseInt(partes[1])-1, parseInt(partes[2]));
  var diff = Math.round((prazo-hoje)/(1000*60*60*24));
  var txt = partes[2]+"/"+partes[1]+"/"+partes[0];
  if(diff < 0) return "<span class='badge-prazo badge-late'>⚠️ Vencido "+txt+"</span>";
  if(diff <= 4) return "<span class='badge-prazo badge-warn'>⏰ "+txt+" ("+diff+"d)</span>";
  return "<span class='badge-prazo badge-ok'>📅 "+txt+"</span>";
}

function contMov(p){
  if(!p.historico || !p.historico.trim()) return 0;
  return p.historico.trim().split("\n").filter(function(l){ return l.trim(); }).length;
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function agora(){
  return new Date().toLocaleString("pt-BR",{
    timeZone:"America/Sao_Paulo",
    day:"2-digit",month:"2-digit",year:"numeric",
    hour:"2-digit",minute:"2-digit"
  });
}

// ============================================================
// DRAG & DROP
// ============================================================
function moverCard(fromIdx, toIdx){
  if(fromIdx === null || fromIdx === toIdx) return;
  var item = D[fromIdx];
  var targetStatus = D[toIdx] ? D[toIdx].status : null;

  if(targetStatus && targetStatus !== item.status){
    var ts = agora();
    var user = MODO === "p" ? "Paulo H." : "Matheus";
    item.status = targetStatus;
    item.data_atualizacao = new Date().toISOString().split("T")[0];
    if(!item.historico) item.historico = "";
    item.historico = (item.historico ? item.historico+"\n" : "") +
      "["+ts+"] "+user+": Status → "+targetStatus+" (movido no quadro)";
    if(targetStatus === "Pendência PH") item.prioridade = true;
    persistirNoBanco(item);
  }
  renderBoard();
}

function dropOnCol(e, status){
  e.preventDefault();
  if(_dragIdx === null) return;
  var item = D[_dragIdx];
  if(item.status === status) return;
  var ts = agora();
  var user = MODO === "p" ? "Paulo H." : "Matheus";
  item.status = status;
  item.data_atualizacao = new Date().toISOString().split("T")[0];
  if(!item.historico) item.historico = "";
  item.historico = (item.historico ? item.historico+"\n" : "") +
    "["+ts+"] "+user+": Status → "+status+" (movido no quadro)";
  if(status === "Pendência PH") item.prioridade = true;
  persistirNoBanco(item);
  renderBoard();
}

// MODAL

function abrirModal(idx){
  MI = idx;
  var x = D[idx];
  document.getElementById("m-nome").textContent = x.razao_social || "";
  document.getElementById("m-tese").textContent = x.tese || "";
  document.getElementById("m-num").textContent = x.numero_processo ? "📋 "+x.numero_processo : "";
  document.getElementById("m-star").textContent = x.prioridade ? "⭐" : "☆";
  document.getElementById("m-cnt").textContent = contMov(x);
  document.getElementById("m-timeline").innerHTML = mkTimeline(x);
  document.getElementById("edit-section").style.display = "none";
  document.getElementById("btn-toggle-edit").textContent = "✏️ Editar dados";
  document.getElementById("eo_m").value = "";

  // Popular select status no footer
  var sel = document.getElementById("es_m");
  sel.innerHTML = "";
  COLUNAS.forEach(function(c){
    var opt = document.createElement("option");
    opt.value = c.status; opt.textContent = c.status;
    if(c.status === x.status) opt.selected = true;
    sel.appendChild(opt);
  });

  document.getElementById("modal-bg").classList.add("show");
}

function fecharModal(){
  document.getElementById("modal-bg").classList.remove("show");
  MI = null;
}

function toggleEditDados(){
  var sec = document.getElementById("edit-section");
  var btn = document.getElementById("btn-toggle-edit");
  if(sec.style.display === "none"){
    var x = D[MI];
    document.getElementById("ed-nome").value = x.razao_social || "";
    document.getElementById("ed-cnpj").value = x.cnpj || "";
    document.getElementById("ed-num").value = x.numero_processo || "";
    document.getElementById("ed-tese").value = x.tese || "";
    document.getElementById("ed-honor").value = x.honorarios || "";
    document.getElementById("ed-prazo").value = x.data_prazo || "";
    document.getElementById("ed-status").value = x.status || "";
    sec.style.display = "block";
    btn.textContent = "✖ Fechar edição";
  } else {
    sec.style.display = "none";
    btn.textContent = "✏️ Editar dados";
  }
}

function salvarDadosModal(){
  if(MI === null) return;
  var x = D[MI];
  var ts = agora();
  var user = MODO === "p" ? "Paulo H." : "Matheus";
  var campos = {
    "ed-nome":"razao_social","ed-tese":"tese","ed-num":"numero_processo",
    "ed-cnpj":"cnpj","ed-honor":"honorarios","ed-prazo":"data_prazo","ed-status":"status"
  };
  var mudancas = [];
  Object.keys(campos).forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    var val = el.value.trim();
    if(val !== (x[campos[id]]||"").toString()){
      mudancas.push(campos[id]+": "+val);
      x[campos[id]] = val;
    }
  });
  if(mudancas.length === 0){ toast("Nenhuma alteração detectada","#8b949e"); return; }
  x.data_atualizacao = new Date().toISOString().split("T")[0];
  if(x.status === "Pendência PH") x.prioridade = true;
  x.historico = (x.historico ? x.historico+"\n" : "") +
    "["+ts+"] "+user+": Dados editados — "+mudancas.join(" | ");
  document.getElementById("m-nome").textContent = x.razao_social || "";
  document.getElementById("m-tese").textContent = x.tese || "";
  document.getElementById("m-num").textContent = x.numero_processo ? "📋 "+x.numero_processo : "";
  document.getElementById("m-cnt").textContent = contMov(x);
  document.getElementById("m-timeline").innerHTML = mkTimeline(x);
  document.getElementById("edit-section").style.display = "none";
  document.getElementById("btn-toggle-edit").textContent = "✏️ Editar dados";
  persistirNoBanco(x);
  toast("✅ Dados salvos!","#3fb950");
  renderBoard();
}

function togStar(idx, ev){

  togStarModal();

function salvarModal(){
  if(MI === null) return;
  var x = D[MI];
  var st = document.getElementById("es_m").value;
  var ob = (document.getElementById("eo_m").value||"").trim();
  if(!ob){ toast("⚠️ Escreva a movimentação antes de salvar","#f85149"); return; }
  var ts = agora();
  var user = MODO === "m" ? "Matheus" : "Paulo H.";
  var linha = "["+ts+"] "+user+": "+st+" | "+ob;
  x.historico = (x.historico ? x.historico+"\n" : "") + linha;
  x.status = st;
  x.observacao = ob;
  x.data_atualizacao = new Date().toISOString().split("T")[0];
  if(x.status === "Pendência PH") x.prioridade = true;
  document.getElementById("m-timeline").innerHTML = mkTimeline(x);
  document.getElementById("m-cnt").textContent = contMov(x);
  document.getElementById("eo_m").value = "";
  // Atualizar select
  var sel = document.getElementById("es_m");
  for(var i=0;i<sel.options.length;i++){
    if(sel.options[i].value === st){ sel.selectedIndex=i; break; }
  }
  persistirNoBanco(x);
  toast("✔ Movimentação salva!","#3fb950");
  renderBoard();
}

// ============================================================
// TIMELINE
// ============================================================
function mkTimeline(x){
  if(!x.historico || !x.historico.trim())
    return "<div class='no-hist'>Nenhuma movimentação registrada ainda.</div>";
  var linhas = x.historico.trim().split("\n").filter(function(l){ return l.trim(); });
  var h = "";
  linhas.slice().reverse().forEach(function(linha, ri){
    var li = linhas.length - 1 - ri;
    var m = linha.match(/^\[(\d{2}\/\d{2}\/\d{4}[^\]]*)\]\s*(.*)$/);
    var data = m ? m[1] : "";
    var texto = m ? m[2] : linha;
    h += "<div class='tl-item'>";
    h += "<div style='flex:1'>";
    if(data) h += "<div class='tl-date'>"+esc(data)+"</div>";
    h += "<div class='tl-item-text' id='tl-txt-"+li+"'>"+esc(texto)+"</div>";
    h += "<div class='tl-edit-box' id='tl-edit-"+li+"'>";
    h += "<textarea id='tl-ta-"+li+"'>"+esc(linha)+"</textarea>";
    h += "<div class='tl-edit-btns'>";
    h += "<button onclick='salvarLinha("+li+")'>💾 Salvar</button>";
    h += "<button onclick='cancelLinha("+li+")'>Cancelar</button>";
    h += "<button onclick='excluirLinha("+li+")' style='color:#f85149'>🗑 Excluir</button>";
    h += "</div></div></div>";
    h += "<div class='tl-actions'>";
    h += "<button class='tl-btn' title='Editar' onclick='editarLinha("+li+")'>✏️</button>";
    h += "</div></div>";
  });
  return h;
}

function editarLinha(li){
  document.querySelectorAll(".tl-edit-box").forEach(function(el){ el.style.display="none"; });
  var box = document.getElementById("tl-edit-"+li);
  if(box) box.style.display = "block";
}
function cancelLinha(li){
  var box = document.getElementById("tl-edit-"+li);
  if(box) box.style.display = "none";
}
function salvarLinha(li){
  if(MI === null) return;
  var ta = document.getElementById("tl-ta-"+li);
  if(!ta) return;
  var novo = ta.value.trim();
  var linhas = D[MI].historico.trim().split("\n").filter(function(l){ return l.trim(); });
  if(!novo){ linhas.splice(li,1); }
  else { linhas[li] = novo; }
  D[MI].historico = linhas.join("\n");
  D[MI].data_atualizacao = new Date().toISOString().split("T")[0];
  document.getElementById("m-timeline").innerHTML = mkTimeline(D[MI]);
  document.getElementById("m-cnt").textContent = contMov(D[MI]);
  persistirNoBanco(D[MI]);
  toast("✅ Entrada atualizada!","#3fb950");
  renderBoard();
}
function excluirLinha(li){
  if(MI === null) return;
  if(!confirm("Excluir esta entrada do histórico?")) return;
  var linhas = D[MI].historico.trim().split("\n").filter(function(l){ return l.trim(); });
  linhas.splice(li,1);
  D[MI].historico = linhas.join("\n");
  D[MI].data_atualizacao = new Date().toISOString().split("T")[0];
  document.getElementById("m-timeline").innerHTML = mkTimeline(D[MI]);
  document.getElementById("m-cnt").textContent = contMov(D[MI]);
  persistirNoBanco(D[MI]);
  toast("🗑️ Entrada removida","#f85149");
  renderBoard();
}

// ============================================================
// NOVO PROCESSO
// ============================================================
function abrirNP(status){
  NP_STATUS = status || "Não Iniciado";
  document.getElementById("np-nome").value = "";
  document.getElementById("np-cnpj").value = "";
  document.getElementById("np-tese").value = "";
  document.getElementById("np-num").value = "";
  document.getElementById("np-prazo").value = "";
  document.getElementById("np-obs").value = "";
  document.getElementById("np-status").value = NP_STATUS;
  document.getElementById("ac-list").style.display = "none";
  document.getElementById("np-bg").classList.add("show");
}

function fecharNP(){
  document.getElementById("np-bg").classList.remove("show");
}

function filtrarClientes(v){
  var ac = document.getElementById("ac-list");
  if(!v || v.length < 2){ ac.style.display="none"; return; }
  v = v.toLowerCase();
  var matches = CLIENTES.filter(function(c){
    return (c.razao_social||"").toLowerCase().indexOf(v) > -1 ||
           (c.cnpj||"").indexOf(v) > -1;
  }).slice(0,8);
  if(!matches.length){ ac.style.display="none"; return; }
  ac.innerHTML = matches.map(function(c){
    return "<div onclick='selecionarCliente(\""+esc(c.razao_social)+"\",\""+esc(c.cnpj)+"\")'>"+
      esc(c.razao_social)+"<span>"+esc(c.cnpj)+"</span></div>";
  }).join("");
  ac.style.display = "block";
}

function selecionarCliente(nome, cnpj){
  document.getElementById("np-nome").value = nome;
  document.getElementById("np-cnpj").value = cnpj;
  document.getElementById("ac-list").style.display = "none";
}

function salvarNovo(){
  var nome = (document.getElementById("np-nome").value||"").trim();
  var tese = (document.getElementById("np-tese").value||"").trim();
  if(!nome || !tese){ toast("⚠️ Razão Social e Tese são obrigatórios","#f85149"); return; }
  var ts = agora();
  var prazo = document.getElementById("np-prazo").value || "";
  var obs = (document.getElementById("np-obs").value||"").trim();
  var st = document.getElementById("np-status").value;
  var hist = "["+ts+"] Matheus: Processo cadastrado";
  if(prazo){
    var p=prazo.split("-").reverse().join("/");
    hist += " | Prazo: "+p;
  }
  if(obs) hist += "\n["+ts+"] Matheus: "+st+" | "+obs;

  var novo = {
    id: "",
    razao_social: nome,
    cnpj: (document.getElementById("np-cnpj").value||"").trim(),
    tese: tese,
    numero_processo: (document.getElementById("np-num").value||"").trim(),
    status: st,
    observacao: obs,
    prioridade: st === "Pendência PH",
    data_prazo: prazo,
    data_atualizacao: new Date().toISOString().split("T")[0],
    historico: hist
  };

  // Criar no banco primeiro, depois adicionar no array local
  criarNoBanco(novo, function(novoComId){
    if(novoComId) D.push(novoComId);
    else D.push(novo);
    fecharNP();
    toast("✅ Processo criado: "+nome,"#3fb950");
    renderBoard();
    // Google Calendar se tiver prazo
    if(prazo){
      fetch(CALENDAR_URL, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({razao_social:nome, tese:tese, data_prazo:prazo, historico:hist})
      }).catch(function(){});
    }
  });
}

// ============================================================
// EXCLUIR PROCESSO
// ============================================================
function pedirRemocao(idx){
  REMOVE_IDX = idx;
  document.getElementById("confirm-msg").textContent =
    "Excluir \"" + (D[idx]||{}).razao_social + "\"? Esta ação não pode ser desfeita.";
  document.getElementById("confirm-bg").classList.add("show");
}

function confirmarRemocao(){
  if(REMOVE_IDX === null) return;
  var id = D[REMOVE_IDX].id;
  var nome = D[REMOVE_IDX].razao_social;
  D.splice(REMOVE_IDX, 1);
  deletarNoBanco(id);
  fecharConfirm();
  fecharModal();
  toast("🗑 \""+nome+"\" removido","#f85149");
  renderBoard();
}

function fecharConfirm(){
  document.getElementById("confirm-bg").classList.remove("show");
  REMOVE_IDX = null;
}

// ============================================================
// PERSISTÊNCIA NO BANCO
// ============================================================
function persistirNoBanco(p){
  if(!p || !p.id) return;
  fetch(CRUD_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"update", id:p.id,
      razao_social:p.razao_social||"",
      cnpj:p.cnpj||"",
      tese:p.tese||"",
      status:p.status||"",
      prioridade:!!p.prioridade,
      numero_processo:p.numero_processo||"",
      honorarios:p.honorarios||"",
      observacao:p.observacao||"",
      historico:p.historico||"",
      data_atualizacao:p.data_atualizacao||"",
      data_prazo:p.data_prazo||""
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(resp){
    if(!resp.ok) toast("❌ Erro ao salvar: "+JSON.stringify(resp.error),"#f85149");
  })
  .catch(function(e){
    toast("❌ Falha de conexão: "+e.message,"#f85149");
    console.error("Erro persistirNoBanco:",e);
  });
}

function criarNoBanco(p, cb){
  fetch(CRUD_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"create",
      razao_social:p.razao_social||"",
      cnpj:p.cnpj||"",
      tese:p.tese||"",
      status:p.status||"Não Iniciado",
      prioridade:!!p.prioridade,
      numero_processo:p.numero_processo||"",
      honorarios:p.honorarios||"",
      observacao:p.observacao||"",
      historico:p.historico||"",
      data_atualizacao:p.data_atualizacao||"",
      data_prazo:p.data_prazo||""
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(resp){
    if(resp.ok && resp.data){
      if(cb) cb(resp.data);
    } else {
      toast("❌ Erro ao salvar no banco: "+JSON.stringify(resp.error),"#f85149");
      if(cb) cb(null);
    }
  })
  .catch(function(e){
    toast("❌ Falha de conexão ao salvar: "+e.message,"#f85149");
    console.error("Erro criarNoBanco:",e);
    if(cb) cb(null);
  });
}

function deletarNoBanco(id){
  if(!id) return;
  fetch(CRUD_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"delete", id:id})
  }).catch(function(e){ console.warn("Erro ao deletar:",e); });
}

document.addEventListener("click", function(e){
  if(!document.getElementById("np-nome-wrap").contains(e.target)){
    document.getElementById("ac-list").style.display="none";
  }
});
