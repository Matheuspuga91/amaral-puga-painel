<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App Movimentacao Amaral e Puga</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9}
#login{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e3a5f);display:flex;align-items:center;justify-content:center;z-index:999}
.lbox{background:#fff;border-radius:20px;padding:40px 32px;width:340px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.logo{font-size:44px;margin-bottom:6px}
.lbox h2{font-size:18px;font-weight:800;margin-bottom:3px;color:#0f172a}
.lbox p{font-size:12px;color:#64748b;margin-bottom:22px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;padding:9px;border-radius:9px;border:2px solid #e2e8f0;background:#f8fafc;font-size:11px;font-weight:700;cursor:pointer;color:#64748b}
.tab.on{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
.lf label{display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;text-align:left;margin-bottom:4px}
.lf input{width:100%;padding:11px;border:2px solid #e2e8f0;border-radius:9px;font-size:14px;outline:none;margin-bottom:13px;display:block}
.lf input:focus{border-color:#3b82f6}
.go{width:100%;padding:13px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer}
.lerr{color:#dc2626;font-size:12px;margin-top:9px;display:none}
#app{display:none}
.hdr{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-t{font-size:15px;font-weight:800}
.hdr-s{font-size:10px;color:#bfdbfe}
.bdg{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.2)}
.bsair{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:11px;cursor:pointer}
.stats{background:#fff;padding:10px 18px;border-bottom:1px solid #e2e8f0;display:flex;gap:18px;flex-wrap:wrap}
.st{display:flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:50%}
.sn{font-size:17px;font-weight:800;line-height:1}
.sl{font-size:10px;color:#64748b;font-weight:600}
.fil{background:#fff;border-bottom:1px solid #e2e8f0;padding:9px 18px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:30}
.srch{position:relative;flex:1;min-width:160px}
.srch input{width:100%;padding:7px 11px 7px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:12px;outline:none}
.srch input:focus{border-color:#3b82f6}
.fb{padding:6px 10px;border-radius:7px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:10px;font-weight:700;cursor:pointer;color:#64748b;white-space:nowrap}
.fb.on{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.fa{padding:6px 10px;border-radius:7px;border:1.5px solid #fca5a5;background:#fff5f5;font-size:10px;font-weight:700;cursor:pointer;color:#dc2626;white-space:nowrap}
.fa.on{background:#dc2626;border-color:#dc2626;color:#fff}
.main{padding:14px 18px;max-width:1060px;margin:0 auto;width:100%}
.sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin:14px 0 7px;display:flex;align-items:center;gap:7px}
.sec span{background:#e2e8f0;color:#475569;padding:1px 7px;border-radius:9px;font-size:9px}
.card{background:#fff;border-radius:11px;padding:13px 14px;margin-bottom:7px;border:1.5px solid #e2e8f0;cursor:pointer;position:relative;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 14px rgba(59,130,246,.12)}
.card.pri{border-color:#fbbf24;background:linear-gradient(135deg,#fffbeb,#fff)}
.card.alerta{border-color:#fca5a5!important;background:linear-gradient(135deg,#fff5f5,#fff)!important}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:9px}
.card-info{flex:1;min-width:0}
.card-nome{font-size:13px;font-weight:800;color:#0f172a}
.card-tese{font-size:11px;color:#64748b;margin-top:2px}
.card-num{font-size:10px;color:#3b82f6;font-family:monospace;margin-top:2px}
.card-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.stbdg{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;text-transform:uppercase}
.al-tag{position:absolute;top:0;right:11px;background:#dc2626;color:#fff;font-size:8px;font-weight:700;padding:2px 7px;border-radius:0 0 6px 6px}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid #f1f5f9;gap:7px}
.card-obs{font-size:10px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-dt{font-size:9px;color:#94a3b8;flex-shrink:0}
.card-dt.at{color:#dc2626;font-weight:700}
.exp{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9}
.card.open .exp{display:block}
.hist-box{background:#f8fafc;border-radius:7px;padding:9px 11px;font-size:10px;color:#475569;line-height:1.8;white-space:pre-wrap;max-height:130px;overflow-y:auto;margin-bottom:9px}
.edit-form{background:#f8fafc;border-radius:9px;padding:12px;border:1.5px solid #e2e8f0;margin-bottom:8px}
.edit-form label{display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px}
.edit-form select,.edit-form textarea{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:12px;outline:none;margin-bottom:9px}
.btn-sv{padding:8px 14px;background:#1d4ed8;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer}
.btn-cl{padding:8px 12px;background:#f1f5f9;color:#64748b;border:none;border-radius:7px;font-size:11px;cursor:pointer;margin-left:6px}
.empty{text-align:center;padding:50px;color:#94a3b8;font-size:13px}
</style>
</head>
<body>

<div id="login">
 <div class="lbox">
  <div class="logo">&#9878;&#65039;</div>
  <h2>App Movimentacao</h2>
  <p>Amaral e Puga Advogados</p>
  <div class="tabs">
   <button class="tab on" id="tabM" onclick="selT('m')">Matheus</button>
   <button class="tab" id="tabP" onclick="selT('p')">Paulo H.</button>
  </div>
  <div class="lf">
   <label>Usuario</label>
   <input type="text" id="usr" placeholder="usuario" autocomplete="username">
   <label>Senha</label>
   <input type="password" id="pwd" placeholder="senha" autocomplete="current-password">
  </div>
  <button class="go" onclick="entrar()">Entrar</button>
  <div class="lerr" id="lerr">Usuario ou senha incorretos</div>
 </div>
</div>

<div id="app">
 <div class="hdr">
  <div style="display:flex;align-items:center;gap:10px">
   <span style="font-size:24px">&#9878;&#65039;</span>
   <div><div class="hdr-t">App Movimentacao Amaral e Puga</div><div class="hdr-s" id="sub">Painel</div></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
   <span class="bdg" id="unm"></span>
   <button class="bsair" onclick="sair()">Sair</button>
  </div>
 </div>
 <div class="stats" id="stats"></div>
 <div class="fil" id="fil"></div>
 <div class="main" id="main"><div class="empty">Carregando...</div></div>
</div>

var D = JSON.parse(atob(_D64));

var MODO="m", SF="", AA=false, CA=null;
var CORES={"Em Execucao":{bg:"#dbeafe",c:"#1d4ed8"},"Em Negociacao":{bg:"#fef3c7",c:"#92400e"},"Finalizado":{bg:"#dcfce7",c:"#166534"},"Nao Iniciado":{bg:"#f1f5f9",c:"#475569"},"Pendencia Cliente":{bg:"#fee2e2",c:"#991b1b"},"Pendencia Documentacao":{bg:"#ffedd5",c:"#9a3412"},"Pendencia PH":{bg:"#f3e8ff",c:"#6b21a8"},"Em Execução":{bg:"#dbeafe",c:"#1d4ed8"},"Em Negociação":{bg:"#fef3c7",c:"#92400e"},"Não Iniciado":{bg:"#f1f5f9",c:"#475569"},"Pendência Cliente":{bg:"#fee2e2",c:"#991b1b"},"Pendência Documentação":{bg:"#ffedd5",c:"#9a3412"},"Pendência PH":{bg:"#f3e8ff",c:"#6b21a8"}};
var ORDEM=["Em Execução","Pendência PH","Pendência Cliente","Pendência Documentação","Em Negociação","Não Iniciado","Finalizado"];

function selT(t){
  document.getElementById("tabM").classList.toggle("on",t==="m");
  document.getElementById("tabP").classList.toggle("on",t==="p");
  document.getElementById("usr").value="";
  document.getElementById("pwd").value="";
}

function entrar(){
  var u=document.getElementById("usr").value.trim().toLowerCase();
  var pw=document.getElementById("pwd").value.trim();
  var ok=false;
  if(u==="matheus"&&pw==="matheus2026"){MODO="m";ok=true;}
  if(u==="paulo"&&pw==="paulo2026"){MODO="p";ok=true;}
  if(!ok){document.getElementById("lerr").style.display="block";return;}
  document.getElementById("lerr").style.display="none";
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("unm").textContent=MODO==="m"?"Matheus":"Paulo H.";
  document.getElementById("sub").textContent=MODO==="m"?"Painel Completo - Matheus":"Suas Pendencias - Paulo Henrique";
  setupFil();render();
}

function sair(){
  document.getElementById("login").style.display="flex";
  document.getElementById("app").style.display="none";
}

function dias(d){if(!d||d==="")return 999;try{return Math.floor((new Date()-new Date(d))/864e5);}catch(e){return 999;}}

function setupFil(){
  var f=document.getElementById("fil");
  var s="<div class='srch'><input id='bsc' placeholder='Buscar empresa ou tese...' oninput='render()'></div>";
  if(MODO==="p"){f.innerHTML=s;return;}
  var sts=["Em Execução","Em Negociação","Pendência PH","Pendência Cliente","Pendência Documentação","Não Iniciado"];
  var b="<button class='fb on' onclick='setF(this,"")'>Todos</button>";
  for(var i=0;i<sts.length;i++){
    b+="<button class='fb' onclick='setF(this,""+sts[i]+"")'>"+sts[i]+"</button>";
  }
  b+="<button class='fa' id='bAl' onclick='togAl()'>+10 dias</button>";
  f.innerHTML=s+b;
}

function setF(el,s){
  SF=s;AA=false;
  var bs=document.querySelectorAll(".fb");
  for(var i=0;i<bs.length;i++) bs[i].classList.remove("on");
  var ba=document.getElementById("bAl");if(ba)ba.classList.remove("on");
  el.classList.add("on");render();
}

function togAl(){
  AA=!AA;SF="";
  var bs=document.querySelectorAll(".fb");
  for(var i=0;i<bs.length;i++) bs[i].classList.remove("on");
  var ba=document.getElementById("bAl");if(ba)ba.classList.toggle("on",AA);
  render();
}

function filtrar(){
  var l=D.slice();
  if(MODO==="p") return l.filter(function(x){return x.prioridade;});
  var bel=document.getElementById("bsc");
  var b=bel?bel.value.toLowerCase():"";
  if(SF) l=l.filter(function(x){return x.status===SF;});
  if(AA) l=l.filter(function(x){return x.status!=="Finalizado"&&dias(x.data_atualizacao)>=10;});
  if(b) l=l.filter(function(x){
    return (x.razao_social||"").toLowerCase().indexOf(b)>=0||(x.tese||"").toLowerCase().indexOf(b)>=0;
  });
  return l;
}

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function getCor(st){
  var c=CORES[st];
  return c||{bg:"#f1f5f9",c:"#475569"};
}

function mkCard(x){
  var d=dias(x.data_atualizacao),al=x.status!=="Finalizado"&&d>=10;
  var ab=CA===x.id,cor=getCor(x.status);
  var cls="card"+(x.prioridade?" pri":"")+(al?" alerta":"")+(ab?" open":"");
  var h="<div class='"+cls+"' id='c"+x.id+"' onclick='tog(this,""+x.id+"")'>";
  if(al) h+="<div class='al-tag'>+10 DIAS SEM ATUALIZACAO</div>";
  h+="<div class='card-top'><div class='card-info'>";
  h+="<div class='card-nome'>"+esc(x.razao_social)+"</div>";
  h+="<div class='card-tese'>"+esc(x.tese)+"</div>";
  if(x.numero_processo) h+="<div class='card-num'>"+esc(x.numero_processo)+"</div>";
  h+="</div><div class='card-r'>";
  h+="<span class='stbdg' style='background:"+cor.bg+";color:"+cor.c+"'>"+esc(x.status)+"</span>";
  h+=(x.prioridade?"<span style='font-size:17px'>&#11088;</span>":"<span style='font-size:16px;opacity:.2'>&#9734;</span>");
  h+="</div></div>";
  if(x.observacao||x.data_atualizacao){
    h+="<div class='card-foot'><div class='card-obs'>"+esc(x.observacao)+"</div>";
    h+="<div class='card-dt"+(al?" at":"")+"'>"+(x.data_atualizacao?"Atualizado: "+x.data_atualizacao:"Sem atualizacao")+(al?" ("+d+"d)":"")+"</div></div>";
  }
  h+="<div class='exp'>";
  if(x.historico) h+="<div class='hist-box'>"+esc(x.historico)+"</div>";
  else h+="<div style='font-size:10px;color:#94a3b8;margin-bottom:8px'>Sem historico.</div>";
  if(MODO==="m") h+="<button class='btn-sv' onclick='event.stopPropagation();abrirEd(""+x.id+"")'>Atualizar Status</button>";
  h+="</div></div>";
  return h;
}

function render(){
  var lista=filtrar(),mn=document.getElementById("main"),sb=document.getElementById("stats");
  if(MODO==="m"){
    var al=D.filter(function(x){return x.status!=="Finalizado"&&dias(x.data_atualizacao)>=10;});
    var pr=D.filter(function(x){return x.prioridade;});
    var at=D.filter(function(x){return x.status!=="Finalizado";});
    sb.innerHTML=
      "<div class='st'><div class='dot' style='background:#3b82f6'></div><div><div class='sn'>"+D.length+"</div><div class='sl'>Total</div></div></div>"+
      "<div class='st'><div class='dot' style='background:#f59e0b'></div><div><div class='sn'>"+at.length+"</div><div class='sl'>Ativos</div></div></div>"+
      "<div class='st'><div class='dot' style='background:#ef4444'></div><div><div class='sn'>"+al.length+"</div><div class='sl'>+10 dias</div></div></div>"+
      "<div class='st'><div class='dot' style='background:#fbbf24'></div><div><div class='sn'>"+pr.length+"</div><div class='sl'>Prioridade PH</div></div></div>";
  }else{
    var lph=D.filter(function(x){return x.prioridade;});
    sb.innerHTML="<div class='st'><div class='dot' style='background:#fbbf24'></div><div><div class='sn'>"+lph.length+"</div><div class='sl'>Suas pendencias</div></div></div>";
  }
  if(!lista.length){mn.innerHTML="<div class='empty'>Nenhum processo encontrado.</div>";return;}
  if(MODO==="p"){
    mn.innerHTML="<div class='sec'>Suas Pendencias <span>"+lista.length+"</span></div>"+lista.map(mkCard).join("");
    return;
  }
  var g={};
  lista.forEach(function(x){var k=x.status||"Outros";if(!g[k])g[k]=[];g[k].push(x);});
  var ks=(SF||AA)?Object.keys(g):ORDEM.filter(function(k){return g[k];});
  mn.innerHTML=ks.map(function(k){
    return g[k]?"<div class='sec'>"+k+" <span>"+g[k].length+"</span></div>"+g[k].map(mkCard).join(""):"";
  }).join("");
}

function tog(el,id){
  var prev=CA;
  if(prev&&prev!==id){var o=document.getElementById("c"+prev);if(o)o.classList.remove("open");}
  CA=(prev===id?null:id);
  if(CA){el.classList.add("open");setTimeout(function(){el.scrollIntoView({behavior:"smooth",block:"nearest"});},80);}
  else{el.classList.remove("open");}
}

function abrirEd(id){
  var x=null;for(var i=0;i<D.length;i++){if(D[i].id===id){x=D[i];break;}}
  if(!x)return;
  var el=document.getElementById("c"+id);
  var exp=el.querySelector(".exp");
  var opts=["Em Execução","Em Negociação","Não Iniciado","Pendência Cliente","Pendência Documentação","Pendência PH","Finalizado"];
  var sel="<select id='es"+id+"'>";
  for(var i=0;i<opts.length;i++){sel+="<option"+(x.status===opts[i]?" selected":"")+">"+opts[i]+"</option>";}
  sel+="</select>";
  exp.innerHTML="<div class='edit-form' onclick='event.stopPropagation()'>"+
    "<label>Status</label>"+sel+
    "<label>Observacao</label><textarea id='eo"+id+"' rows='2'>"+esc(x.observacao||"")+"</textarea>"+
    "<button class='btn-sv' onclick='event.stopPropagation();salvar(""+id+"")'>Salvar</button>"+
    "<button class='btn-cl' onclick='event.stopPropagation();CA=null;render()'>Cancelar</button>"+
    "</div>";
}

function salvar(id){
  var st=document.getElementById("es"+id).value;
  var ob=document.getElementById("eo"+id).value||"";
  var x=null;for(var i=0;i<D.length;i++){if(D[i].id===id){x=D[i];break;}}
  if(!x)return;
  var agora=new Date().toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"});
  if(st!==x.status||ob!==x.observacao){
    x.historico=(x.historico||"")+"
["+agora+"] Matheus: "+st+(ob?" | "+ob:"");
    x.historico=x.historico.trim();
  }
  x.status=st;x.observacao=ob;x.data_atualizacao=new Date().toISOString().split("T")[0];
  CA=null;render();
}
