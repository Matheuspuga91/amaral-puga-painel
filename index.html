<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App Movimentação Amaral e Puga</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--blue:#1f6feb;--blue2:#388bfd;--gold:#f0b429;--red:#f85149;--green:#3fb950;--purple:#a371f7;--orange:#e3b341}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#0d1117,#1a1f2e,#0d1117);display:flex;align-items:center;justify-content:center;z-index:999}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.logo{font-size:48px;margin-bottom:8px}
.lbox h2{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px}
.lbox p{font-size:12px;color:var(--text2);margin-bottom:24px}
.ltabs{display:flex;gap:6px;margin-bottom:20px;background:var(--bg3);border-radius:10px;padding:4px}
.ltab{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);transition:.2s}
.ltab.on{background:var(--blue);color:#fff}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;text-align:left;margin-bottom:5px;letter-spacing:.5px}
.lf input{width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);outline:none;margin-bottom:14px;display:block;transition:.2s}
.lf input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,111,235,.2)}
.go{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer}
.go:hover{background:var(--blue2)}
.lerr{color:var(--red);font-size:12px;margin-top:10px;display:none}
/* APP */
#app{display:none;height:100vh;flex-direction:column}
.hdr{background:rgba(13,17,23,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:26px}
.hdr-t{font-size:15px;font-weight:800}
.hdr-s{font-size:11px;color:var(--text2)}
.hdr-r{display:flex;gap:8px;align-items:center}
.usr-bdg{padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700}
.btn-sair{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer}
.btn-sair:hover{border-color:var(--red);color:var(--red)}
.stats{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;gap:20px;align-items:center;flex-shrink:0;overflow-x:auto}
.stat{display:flex;align-items:center;gap:7px;white-space:nowrap}
.stat-n{font-size:18px;font-weight:800}
.stat-l{font-size:10px;color:var(--text2);font-weight:600}
.sdot{width:8px;height:8px;border-radius:50%}
.sbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.sinp{flex:1;min-width:200px;padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.sinp:focus{border-color:var(--blue)}
.sinp::placeholder{color:var(--text2)}
.fbtns{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);transition:.15s;white-space:nowrap}
.fb:hover,.fb.on{background:var(--blue);border-color:var(--blue);color:#fff}
.fb.gold{border-color:var(--gold);color:var(--gold)}
.fb.gold:hover,.fb.gold.on{background:var(--gold);border-color:var(--gold);color:#0d1117}
.fb.red{border-color:var(--red);color:var(--red)}
.fb.red:hover,.fb.red.on{background:var(--red);border-color:var(--red);color:#fff}
/* BOARD */
.board-wrap{flex:1;overflow-x:auto;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;min-height:0}
.col{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:300px;min-width:300px;display:flex;flex-direction:column;max-height:calc(100vh - 176px)}
.col-hdr{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:12px 12px 0 0;gap:8px}
.col-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;flex:1}
.col-cnt{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.col-add{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:2px 8px;font-size:12px;cursor:pointer;flex-shrink:0;transition:.15s}
.col-add:hover{border-color:var(--blue2);color:var(--blue2)}
.col-body{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* CARD */
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative}
.kcard:hover{border-color:var(--blue2);box-shadow:0 0 0 1px var(--blue2),0 4px 16px rgba(31,111,235,.15);transform:translateY(-1px)}
.kcard.pri{border-color:var(--gold)!important}
.kcard.alerta{border-color:var(--red)!important}
.kcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.kcard-info{flex:1;min-width:0}
.kcard-nome{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.kcard-tese{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}
.kcard-num{font-size:10px;color:var(--blue2);font-family:monospace;margin-top:3px}
.kcard-actions{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.star-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:0 2px;line-height:1;transition:transform .15s}
.star-btn:hover{transform:scale(1.3)}
.rem-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:5px;font-size:10px;padding:2px 6px;cursor:pointer;transition:.15s;white-space:nowrap}
.rem-btn:hover{border-color:var(--red);color:var(--red)}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-top:8px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.tag-al{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.tag-pri{background:rgba(240,180,41,.15);color:var(--gold);border:1px solid rgba(240,180,41,.3)}
.kcard-dt{font-size:10px;color:var(--text2)}
.kcard-dt.at{color:var(--red);font-weight:700}
.kcard-obs{font-size:11px;color:var(--text2);margin-top:7px;padding-top:7px;border-top:1px solid var(--border);line-height:1.5}
.empty-col{font-size:12px;color:var(--text2);text-align:center;padding:20px;font-style:italic}
.btn-add-card{width:100%;padding:9px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:.15s;text-align:center;margin-top:4px}
.btn-add-card:hover{border-color:var(--blue2);color:var(--blue2);background:rgba(31,111,235,.05)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.9)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.modal-info{flex:1;min-width:0}
.modal-nome{font-size:17px;font-weight:800;color:var(--text)}
.modal-tese{font-size:12px;color:var(--text2);margin-top:3px}
.modal-num{font-size:11px;color:var(--blue2);font-family:monospace;margin-top:2px}
.modal-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.modal-star{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:0 4px;transition:transform .15s}
.modal-star:hover{transform:scale(1.2)}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:18px 20px;flex:1}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.msec span{background:var(--bg3);color:var(--text2);font-size:9px;padding:1px 7px;border-radius:20px}
/* TIMELINE */
.timeline{position:relative;padding-left:22px;margin-bottom:16px}
.timeline::before{content:'';position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:var(--border);border-radius:2px}
.titem{position:relative;margin-bottom:18px;padding-bottom:2px}
.titem::before{content:'';position:absolute;left:-16px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid var(--bg2);box-shadow:0 0 0 2px var(--blue)}
.titem.ultimo::before{background:var(--green);box-shadow:0 0 0 2px var(--green)}
.t-data{font-size:11px;color:var(--text2);margin-bottom:3px}
.t-user{font-size:13px;font-weight:700;color:var(--blue2);display:block;margin-bottom:5px}
.t-stbdg{display:inline-block;font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;margin-bottom:5px}
.t-obs{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-top:4px}
.no-hist{font-size:13px;color:var(--text2);font-style:italic;padding:16px;background:var(--bg3);border-radius:8px;text-align:center;margin-bottom:14px}
/* FORM */
.edit-form{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:15px}
.edit-form label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:5px;letter-spacing:.5px}
.edit-form select,.edit-form textarea{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;margin-bottom:12px;font-family:inherit}
.edit-form select:focus,.edit-form textarea:focus{border-color:var(--blue)}
.form-btns{display:flex;gap:8px}
.btn-sv{padding:9px 18px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-sv:hover{background:var(--blue2)}
.btn-cl{padding:9px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:13px;cursor:pointer}
.btn-cl:hover{border-color:var(--text2);color:var(--text)}
/* MODAL NOVO PROCESSO */
.modal-np{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.9);padding:24px}
.modal-np h3{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:5px;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
/* CONFIRMAR REMOÇÃO */
.confirm-box{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center}
.confirm-box.show{display:flex}
.confirm-inner{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.confirm-inner h4{font-size:15px;font-weight:700;margin-bottom:8px}
.confirm-inner p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.confirm-btns{display:flex;gap:8px;justify-content:center}
.btn-del{padding:9px 20px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-cancel{padding:9px 16px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login">
 <div class="lbox">
  <div class="logo">⚖️</div>
  <h2>Amaral e Puga</h2>
  <p>Sistema de Gestão de Processos</p>
  <div class="ltabs">
   <button class="ltab on" id="tabM" onclick="selT('m')">Matheus</button>
   <button class="ltab" id="tabP" onclick="selT('p')">Paulo H.</button>
  </div>
  <div class="lf">
   <label>Usuário</label>
   <input type="text" id="usr" placeholder="seu usuário">
   <label>Senha</label>
   <input type="password" id="pwd" placeholder="••••••••">
  </div>
  <button class="go" onclick="entrar()">Entrar</button>
  <div class="lerr" id="lerr">Usuário ou senha incorretos</div>
 </div>
</div>
<!-- APP -->
<div id="app">
 <div class="hdr">
  <div class="hdr-l">
   <span class="hdr-logo">⚖️</span>
   <div><div class="hdr-t">App Movimentação Amaral e Puga</div><div class="hdr-s" id="sub"></div></div>
  </div>
  <div class="hdr-r">
   <span class="usr-bdg" id="unm"></span>
   <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
 </div>
 <div class="stats" id="stats"></div>
 <div class="sbar" id="sbar"></div>
 <div class="board-wrap" id="board"></div>
</div>
<!-- MODAL MOVIMENTAÇÃO -->
<div class="overlay" id="overlay" onclick="fecharModal(event)">
 <div class="modal" id="modal">
  <div class="modal-hdr">
   <div class="modal-info">
    <div class="modal-nome" id="m-nome"></div>
    <div class="modal-tese" id="m-tese"></div>
    <div class="modal-num" id="m-num"></div>
   </div>
   <div class="modal-btns">
    <button class="modal-star" id="m-star" onclick="togStarModal()" title="Adicionar/remover da fila do Paulo">☆</button>
    <button class="modal-close" onclick="fecharModal()">✕</button>
   </div>
  </div>
  <div class="modal-body">
   <div class="msec">Histórico de Movimentações <span id="m-cnt">0</span></div>
   <div id="m-timeline"></div>
   <div class="edit-form" id="m-form"></div>
  </div>
 </div>
</div>
<!-- MODAL NOVO PROCESSO -->
<div class="overlay" id="overlay-np" onclick="fecharNP(event)">
 <div class="modal-np" id="modal-np">
  <h3>➕ Novo Processo <button onclick="fecharNP()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">✕</button></h3>
  <div class="field"><label>Razão Social *</label><input type="text" id="np-nome" placeholder="Nome da empresa"></div>
  <div class="field"><label>CNPJ</label><input type="text" id="np-cnpj" placeholder="00.000.000/0001-00"></div>
  <div class="field"><label>Tese *</label><input type="text" id="np-tese" placeholder="Tese tributária"></div>
  <div class="field"><label>Nº Processo</label><input type="text" id="np-num" placeholder="0000000-00.0000.0.00.0000"></div>
  <div class="field"><label>Status</label>
   <select id="np-status">
    <option>Não Iniciado</option>
    <option>Em Negociação</option>
    <option>Pendência PH</option>
    <option>Pendência Cliente</option>
    <option>Pendência Documentação</option>
    <option>Finalizado</option>
   </select>
  </div>
  <div class="field"><label>Observação inicial</label><textarea id="np-obs" rows="3" placeholder="Observação..."></textarea></div>
  <div class="form-btns" style="margin-top:4px">
   <button class="btn-sv" onclick="salvarNovo()">✓ Adicionar Processo</button>
   <button class="btn-cl" onclick="fecharNP()">Cancelar</button>
  </div>
 </div>
</div>
<!-- CONFIRMAR REMOÇÃO -->
<div class="confirm-box" id="confirm-box">
 <div class="confirm-inner">
  <h4>🗑 Remover processo?</h4>
  <p id="confirm-txt">Tem certeza que deseja remover este processo do quadro?</p>
  <div class="confirm-btns">
   <button class="btn-del" onclick="confirmarRemocao()">Remover</button>
   <button class="btn-cancel" onclick="fecharConfirm()">Cancelar</button>
  </div>
 </div>
</div>

function selT(t){
  document.getElementById("tabM").className="ltab"+(t==="m"?" on":"");
  document.getElementById("tabP").className="ltab"+(t==="p"?" on":"");
}
function toast(msg,cor){
  var t=document.getElementById("toast");
  t.textContent=msg; t.style.borderColor=cor||"#30363d";
  t.style.display="block";
  setTimeout(function(){t.style.display="none";},3000);
}
function dias(d){if(!d)return 999;try{return Math.floor((Date.now()-new Date(d).getTime())/864e5);}catch(e){return 999;}}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function gc(st){return COR[st]||{bg:"rgba(139,148,158,.1)",c:"#8b949e",bdr:"rgba(139,148,158,.3)"};}
function contMov(x){if(!x.historico||!x.historico.trim())return 0;return x.historico.split("\n").filter(function(l){return l.trim();}).length;}

function entrar(){
  var u=document.getElementById("usr").value.trim().toLowerCase();
  var pw=document.getElementById("pwd").value.trim();
  if(u==="matheus"&&pw==="matheus2026")MODO="m";
  else if(u==="paulo"&&pw==="paulo2026")MODO="p";
  else{document.getElementById("lerr").style.display="block";return;}
  document.getElementById("lerr").style.display="none";
  document.getElementById("login").style.display="none";
  var ap=document.getElementById("app");ap.style.display="flex";
  document.getElementById("unm").textContent=MODO==="m"?"Matheus":"Paulo H.";
  document.getElementById("sub").textContent=MODO==="m"?"Painel Completo":"Suas Pendências — Paulo Henrique";
  setupBar(); renderBoard();
}
function sair(){
  document.getElementById("login").style.display="flex";
  document.getElementById("app").style.display="none";
  MI=null;SF="";AA=false;FP=false;
}
function setupBar(){
  var sb=document.getElementById("sbar");
  var h="<input class='sinp' id='bsc' oninput='renderBoard()' placeholder='🔍  Buscar empresa ou tese...'>";
  h+="<div class='fbtns'>";
  if(MODO==="m"){
    h+="<button class='fb on' onclick='setF(this,null)'>Todos</button>";
    h+="<button class='fb gold' id='bFP' onclick='togFP()'>⭐ PH</button>";
    h+="<button class='fb red' id='bAA' onclick='togAA()'>🔴 +10 dias</button>";
  }
  h+="</div>";
  sb.innerHTML=h;
}
function setF(el,s){SF=s||"";AA=false;FP=false;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  el.classList.add("on");renderBoard();
}
function togFP(){FP=!FP;SF="";AA=false;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  var b=document.getElementById("bFP");if(b)b.classList.toggle("on",FP);renderBoard();
}
function togAA(){AA=!AA;SF="";FP=false;
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on");});
  var b=document.getElementById("bAA");if(b)b.classList.toggle("on",AA);renderBoard();
}
function filtrar(){
  var l=D.slice();
  if(MODO==="p") return l.filter(function(x){return x.prioridade;});
  var bel=document.getElementById("bsc");
  var b=bel?bel.value.toLowerCase():"";
  if(SF) l=l.filter(function(x){return x.status===SF;});
  if(AA) l=l.filter(function(x){return x.status!=="Finalizado"&&dias(x.data_atualizacao)>=10;});
  if(FP) l=l.filter(function(x){return x.prioridade;});
  if(b) l=l.filter(function(x){return(x.razao_social||"").toLowerCase().indexOf(b)>=0||(x.tese||"").toLowerCase().indexOf(b)>=0;});
  return l;
}

      "<div class='stat'><div class='sdot' style='background:#e3b341'></div><div class='stat-n'>"+D.filter(function(x){return x.status==="Em Negociação";}).length+"</div><div class='stat-l'>Em Negociação</div></div>"+
      "<div class='stat'><div class='sdot' style='background:#f85149'></div><div class='stat-n'>"+al.length+"</div><div class='stat-l'>+10 dias parado</div></div>"+
      "<div class='stat'><div class='sdot' style='background:#f0b429'></div><div class='stat-n'>"+pr.length+"</div><div class='stat-l'>⭐ Pendência PH</div></div>"+
      "<div class='stat'><div class='sdot' style='background:#3fb950'></div><div class='stat-n'>"+D.filter(function(x){return x.status==="Finalizado";}).length+"</div><div class='stat-l'>Finalizados</div></div>";
  } else {
    var lph=D.filter(function(x){return x.prioridade;});
    st.innerHTML="<div class='stat'><div class='sdot' style='background:#f0b429'></div><div class='stat-n'>"+lph.length+"</div><div class='stat-l'>Suas pendências</div></div>";
  }
  var colunas=MODO==="p"?ORD_P:ORD_M;
  var grupos={};
  colunas.forEach(function(k){grupos[k]=[];});
  lista.forEach(function(x){
    var k=x.status||"Não Iniciado";
    if(!grupos[k])grupos[k]=[];
    grupos[k].push(x);
  });
  var h="";
  colunas.forEach(function(col){
    var items=grupos[col]||[];
    var cor=gc(col);
    h+="<div class='col'>";
    h+="<div class='col-hdr' style='background:"+cor.bg+";border-color:"+cor.bdr+"'>";
    h+="<span class='col-name' style='color:"+cor.c+"'>"+esc(col)+"</span>";
    h+="<span class='col-cnt'>"+items.length+"</span>";
    h+="<button class='col-add' onclick='abrirNP(\""+col+"\")' title='Adicionar processo nesta coluna'>+ Novo</button>";
    h+="</div><div class='col-body' id='col-"+col.replace(/\s/g,"_")+"'>";
    if(!items.length){h+="<div class='empty-col'>Nenhum processo</div>";}
    else{items.forEach(function(x){h+=mkCard(x,D.indexOf(x));});}
    h+="<button class='btn-add-card' onclick='abrirNP(\""+col+"\")'>➕ Adicionar processo</button>";
    h+="</div></div>";
  });
  bd.innerHTML=h;
}
function mkCard(x,idx){
  var d=dias(x.data_atualizacao),al=x.status!=="Finalizado"&&d>=10;
  var nm=contMov(x);
  var cls="kcard"+(x.prioridade?" pri":"")+(al?" alerta":"");
  var h="<div class='"+cls+"' id='kc-"+idx+"'>";
  h+="<div class='kcard-top'>";
  h+="<div class='kcard-info' onclick='abrirModal("+idx+")'>";
  h+="<div class='kcard-nome'>"+esc(x.razao_social)+"</div>";
  h+="<div class='kcard-tese'>"+esc(x.tese)+"</div>";
  if(x.numero_processo)h+="<div class='kcard-num'>"+esc(x.numero_processo)+"</div>";
  h+="</div>";
  h+="<div class='kcard-actions'>";
  if(MODO==="m"){
    h+="<button class='star-btn' onclick='togStar("+idx+",event)' title='"+(x.prioridade?"Remover da fila do Paulo":"Adicionar à fila do Paulo")+"'>"+(x.prioridade?"⭐":"☆")+"</button>";
    h+="<button class='rem-btn' onclick='pedirRemocao("+idx+",event)'>✕ remover</button>";
  } else {
    if(x.prioridade)h+="<span style='font-size:16px'>⭐</span>";
  }
  h+="</div></div>";
  h+="<div onclick='abrirModal("+idx+")'>";
  h+="<div class='kcard-foot'>";
  h+="<div class='tags'>";
  if(al)h+="<span class='tag tag-al'>+"+d+"d sem mov.</span>";
  if(x.prioridade)h+="<span class='tag tag-pri'>⭐ PH</span>";
  h+="</div>";
  h+="<div class='kcard-dt"+(al?" at":"")+"'>"+(nm>0?"💬 "+nm:"")+"</div>";
  h+="</div>";
  if(x.observacao){h+="<div class='kcard-obs'>"+esc(x.observacao.substring(0,100))+(x.observacao.length>100?"…":"")+"</div>";}
  h+="</div></div>";
  return h;
}
// MODAL MOVIMENTAÇÃO
function abrirModal(idx){
  MI=idx; var x=D[idx];
  document.getElementById("m-nome").textContent=x.razao_social||"";
  document.getElementById("m-tese").textContent=x.tese||"";
  document.getElementById("m-num").textContent=x.numero_processo?"📋 "+x.numero_processo:"";
  document.getElementById("m-star").textContent=x.prioridade?"⭐":"☆";
  document.getElementById("m-cnt").textContent=contMov(x);
  document.getElementById("m-timeline").innerHTML=mkTimeline(x);
  var stsel=SL.map(function(s){return "<option"+(x.status===s?" selected":"")+">"+s+"</option>";}).join("");
  document.getElementById("m-form").innerHTML=
    "<label>Novo Status</label><select id='es_m'>"+stsel+"</select>"+
    "<label>Movimentação / Observação</label>"+
    "<textarea id='eo_m' rows='4' placeholder='Descreva a movimentação, próximo passo, decisão...'></textarea>"+
    "<div class='form-btns'><button class='btn-sv' onclick='salvarModal()'>✓ Salvar Movimentação</button>"+
    "<button class='btn-cl' onclick='fecharModal()'>Cancelar</button></div>";
  document.getElementById("overlay").classList.add("show");
}
function fecharModal(ev){
  if(ev&&ev.target!==document.getElementById("overlay"))return;
  document.getElementById("overlay").classList.remove("show"); MI=null;
}
function togStarModal(){
  if(MI===null)return; var x=D[MI];
  x.prioridade=!x.prioridade;
  var agora=new Date().toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  var acao=x.prioridade?"["+agora+"] Matheus: Adicionado à Pendência PH ⭐":"["+agora+"] Matheus: Removido da Pendência PH";
  x.historico=((x.historico?x.historico+"\n":"")+acao).trim();
  document.getElementById("m-star").textContent=x.prioridade?"⭐":"☆";
  document.getElementById("m-timeline").innerHTML=mkTimeline(x);
  document.getElementById("m-cnt").textContent=contMov(x);
  toast(x.prioridade?"⭐ Adicionado à Pendência do Paulo!":"☆ Removido da Pendência do Paulo","#f0b429");
  renderBoard();
}
function togStar(idx,ev){if(ev)ev.stopPropagation();MI=idx;togStarModal();MI=null;}
function salvarModal(){
  if(MI===null)return; var x=D[MI];
  var st=document.getElementById("es_m").value;
  var ob=(document.getElementById("eo_m").value||"").trim();
  if(!ob){toast("⚠️ Escreva a movimentação antes de salvar","#f85149");return;}
  var agora=new Date().toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  var user=MODO==="m"?"Matheus":"Paulo H.";
  var linha="["+agora+"] "+user+": "+st+" | "+ob;
  x.historico=((x.historico?x.historico+"\n":"")+linha).trim();
  x.status=st; x.observacao=ob;
  x.data_atualizacao=new Date().toISOString().split("T")[0];
  document.getElementById("m-timeline").innerHTML=mkTimeline(x);
  document.getElementById("m-cnt").textContent=contMov(x);
  document.getElementById("eo_m").value="";
  toast("✔ Movimentação salva com sucesso!","#3fb950");
  renderBoard();
}
// MODAL NOVO PROCESSO
function abrirNP(col){
  NP_STATUS=col||"Não Iniciado";
  document.getElementById("np-status").value=NP_STATUS;
  document.getElementById("np-nome").value="";
  document.getElementById("np-cnpj").value="";
  document.getElementById("np-tese").value="";
  document.getElementById("np-num").value="";
  document.getElementById("np-obs").value="";
  document.getElementById("overlay-np").classList.add("show");
}
function fecharNP(ev){
  if(ev&&ev.target!==document.getElementById("overlay-np"))return;
  document.getElementById("overlay-np").classList.remove("show"); NP_STATUS=null;
}
function salvarNovo(){
  var nome=(document.getElementById("np-nome").value||"").trim();
  var tese=(document.getElementById("np-tese").value||"").trim();
  if(!nome||!tese){toast("⚠️ Razão Social e Tese são obrigatórios","#f85149");return;}
  var agora=new Date().toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  var novo={
    razao_social:nome,
    cnpj:(document.getElementById("np-cnpj").value||"").trim(),
    tese:tese,
    numero_processo:(document.getElementById("np-num").value||"").trim(),
    status:document.getElementById("np-status").value,
    observacao:(document.getElementById("np-obs").value||"").trim(),
    prioridade:false,
    data_atualizacao:new Date().toISOString().split("T")[0],
    historico:"["+agora+"] Matheus: Processo cadastrado"
  };
  D.push(novo);
  fecharNP();
  toast("✅ Processo adicionado: "+nome,"#3fb950");
  renderBoard();
}
// REMOVER CARD
function pedirRemocao(idx,ev){
  if(ev)ev.stopPropagation();
  REMOVE_IDX=idx;
  var x=D[idx];
  document.getElementById("confirm-txt").textContent="Remover \""+x.razao_social+"\" ("+x.tese+") do quadro?";
  document.getElementById("confirm-box").classList.add("show");
}
function confirmarRemocao(){
  if(REMOVE_IDX===null)return;
  var nome=D[REMOVE_IDX].razao_social;
  D.splice(REMOVE_IDX,1);
  fecharConfirm();
  toast("🗑 \""+nome+"\" removido do quadro","#f85149");
  renderBoard();
}
function fecharConfirm(){
  document.getElementById("confirm-box").classList.remove("show"); REMOVE_IDX=null;
}
// TIMELINE
function mkTimeline(x){
  if(!x.historico||!x.historico.trim())return"<div class='no-hist'>Nenhuma movimentação registrada ainda.</div>";
  var linhas=x.historico.split("\n").filter(function(l){return l.trim();}).reverse();
  var h="<div class='timeline'>";
  for(var i=0;i<linhas.length;i++){
    var l=linhas[i].trim();
    var m=l.match(/^\[([^\]]+)\]\s*([^:]+):\s*(.*)$/);
    var cls="titem"+(i===linhas.length-1?" ultimo":"");
    h+="<div class='"+cls+"'>";
    if(m){
      h+="<div class='t-data'>"+esc(m[1])+"</div>";
      h+="<span class='t-user'>"+esc(m[2])+"</span>";
      var partes=m[3].split(" | ");
      var stT=partes[0]||"";
      var obsT=partes.slice(1).join(" | ");
      var c2=gc(stT);
      if(stT&&COR[stT]){
        h+="<span class='t-stbdg' style='background:"+c2.bg+";color:"+c2.c+";border:1px solid "+c2.bdr+"'>"+esc(stT)+"</span>";
        if(obsT)h+="<div class='t-obs'>"+esc(obsT)+"</div>";
      } else {
        if(m[3])h+="<div class='t-obs'>"+esc(m[3])+"</div>";
      }
    } else {
      h+="<div class='t-obs'>"+esc(l)+"</div>";
    }
    h+="</div>";
  }
  return h+"</div>";
}
document.getElementById("pwd").addEventListener("keydown",function(e){if(e.key==="Enter")entrar();});
document.getElementById("usr").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("pwd").focus();});
</script>
